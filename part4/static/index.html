<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - List of Places</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html">
                <img src="images/logo.png" alt="HBnB Logo" class="logo">
            </a>
            <nav>
                <a href="login.html" id="login-link" class="login-button">Login</a>
            </nav>
        </div>
    </header>
    <main>
        <section id="hero">
            <div class="hero-overlay">
                <h2 class="hero-title">Extraordinary stays for extraordinary minds</h2>
                <p class="hero-subtitle">London &bull; Paris &bull; Normandy &bull; Monaco &bull; Sussex &bull; Many other fantastic & mysterious places</p>
            </div>
        </section>
        <section id="filter">
            <label for="price-filter">Max Price:</label>
            <select id="price-filter">
                <!-- Options will be populated dynamically -->
            </select>
            <label for="country-filter">Country:</label>
            <select id="country-filter">
                <!-- Options will be populated dynamically -->
            </select>
        </section>
        <section id="places-list">
            <!-- List of places will be populated dynamically -->
        </section>
    </main>
    <footer>
        <p>&copy; 2025 HBnB &mdash; All rights reserved.</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
